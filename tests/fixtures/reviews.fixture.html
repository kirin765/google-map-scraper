<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Reviews fixture</title>
  </head>
  <body>
    <section>
      <article
        data-review-id="rev-1"
        aria-label="Reviewed by Jane Doe · 4.9 stars · Posted on 2024-02-01"
      >
        <span data-author-name="Jane Doe"></span>
        <a data-author-url="https://example.com/users/jane">Profile</a>
        <span data-rating="4.9"></span>
        <time datetime="2024-02-01">Feb 2024</time>
        <p data-review-text>Great coffee and friendly staff.</p>
        <span data-like-count="12"></span>
        <img data-photo-url="https://lh3.googleusercontent.com/photo-a.jpg" alt="Latte art" width="640" height="480" />
        <img src="https://lh3.googleusercontent.com/photo-b.jpg" alt="Interior" width="800" height="600" />
      </article>
      <article data-review-id="rev-2" aria-label="Reviewed by Min · 4.5 stars">
        <span data-author-name="Min"></span>
        <span data-rating="4.5"></span>
        <p data-review-text>Nice atmosphere.</p>
      </article>
    </section>
  </body>
</html>
